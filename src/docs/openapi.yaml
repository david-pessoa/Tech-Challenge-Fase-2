openapi: 3.0.3
info:
  title: API de Gerenciamento de Posts
  description: API para gerenciamento de posts e usuários.
  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: Servidor Local
  - url: https://tech-challenge-fase-2-1uhu.onrender.com/api
    description: Servidor em Produção (Render)

tags:
  - name: Posts
  - name: Usuários
  - name: Autenticação

paths:
  /posts:
    get:
      tags:
        - Posts
      summary: Listar todos os posts
      description: Retorna a lista de posts. Para alunos, informa se o post já foi visualizado. Para professores e administradores, informa os alunos que visualizaram o post.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de posts retornada com sucesso.
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: '#/components/schemas/PostAluno'
                  - type: array
                    items:
                      $ref: '#/components/schemas/PostProfessor'
              examples:
                aluno:
                  $ref: '#/components/examples/ListaPostsAluno'
                professor:
                  $ref: '#/components/examples/ListaPostsProfessor'

        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      tags:
        - Posts
      summary: Criar um novo post
      description: Permite que professores e administradores autenticados criem novas postagens.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - titulo
                - descricao
                - conteudo
              properties:
                titulo:
                  type: string
                  example: Introdução à Programação
                descricao:
                  type: string
                  example: Conceitos básicos de programação.
                conteudo:
                  type: string
                  example: Lorem Ipsum dolor sit amet...
      responses:
        '201':
          description: Post criado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: 'Post criado com sucesso!'
        '400':
          description: Dados inválidos.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: 'Dados inválidos'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

        '403':
          $ref: '#/components/responses/ForbiddenError'

  /posts/{id}:
    get:
      tags:
        - Posts
      summary: Obter um post pelo ID
      description: Retorna o conteúdo completo de um post específico. Quando acessado por um aluno, registra automaticamente a visualização do post.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID do post
      responses:
        '200':
          description: Post encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostBase'
              example:
                postId: 33d5256f-5199-4a3d-b06d-e3d7cd0f64f0
                titulo: Aula inicial
                descricao: Primeira aula de ciências do curso
                conteudo: Lorem Ipsum dolor sit amet...
                dataCriacao: '2026-01-29T10:00:00.000Z'
                dataModificacao: '2026-05-04T10:00:00.000Z'
        '404':
          description: Post não encontrado.
          content:
            application/json:
              example:
                message: Post não encontrado

    put:
      tags:
        - Posts
      summary: Atualizar um post
      description: Permite que administradores atualizem qualquer post e professores atualizem apenas os posts que criaram.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID do post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                titulo:
                  type: string
                  example: Novo título
                descricao:
                  type: string
                  example: Nova descrição
                conteudo:
                  type: string
                  example: Conteúdo atualizado da postagem.
      responses:
        '200':
          description: Post atualizado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Post atualizado com sucesso!
        '404':
          description: Post não encontrado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Post não encontrado
        '401':
          $ref: '#/components/responses/UnauthorizedError'

        '403':
          $ref: '#/components/responses/ForbiddenError'

    delete:
      tags:
        - Posts
      summary: Excluir um post
      description: Permite que administradores excluam qualquer post e professores excluam apenas os posts que criaram.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID do post
      responses:
        '200':
          description: Post removido com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Post removido com sucesso
        '404':
          description: Post não encontrado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Post não encontrado
        '401':
          $ref: '#/components/responses/UnauthorizedError'

        '403':
          $ref: '#/components/responses/ForbiddenError'

  /posts/search:
    get:
      tags:
        - Posts
      summary: Buscar posts
      description: Busca posts por palavras-chave presentes no título, descrição ou conteúdo, sem diferenciar letras maiúsculas e minúsculas.
      security:
        - bearerAuth: []
      parameters:
        - name: termo
          in: query
          required: true
          schema:
            type: string
          example: matemática
      responses:
        '200':
          description: Lista de posts encontrados.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
              example:
                - postId: 33d5256f-5199-4a3d-b06d-e3d7cd0f64f0
                  titulo: Aula inicial
                  descricao: Primeira aula de matemática do curso
                  conteudo: Lorem Ipsum dolor sit amet...
                  dataCriacao: '2026-01-29T10:00:00.000Z'
                  dataModificacao: '2026-05-04T10:00:00.000Z'
                  criadoPor:
                    nome: Ana Professora
                    tipoUsuario: PROFESSOR

                - postId: 44d5256f-5199-4a3d-b06d-e3d7cd0f64f1
                  titulo: Aula de Matemática
                  descricao: Aula de função do 2º grau
                  conteudo: Lorem Ipsum dolor sit amet...
                  dataCriacao: '2026-03-10T10:00:00.000Z'
                  dataModificacao: '2026-05-04T10:00:00.000Z'
                  criadoPor:
                    nome: Ricardo Professor
                    tipoUsuario: PROFESSOR
        '400':
          description: Termo de busca inválido.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Termo de busca inválido
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /user:
    post:
      tags:
        - Usuários
      summary: Criar usuário
      description: Cria um novo usuário no sistema.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roleId
                - matricula
                - senha
                - nome
              properties:
                roleId:
                  type: string
                  example: 78e6d80d-b03a-48a6-881d-a695979e8a69
                matricula:
                  type: string
                  example: 303030
                senha:
                  type: string
                  example: senha123
                nome:
                  type: string
                  example: João Silva
      responses:
        '201':
          description: Usuário criado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Usuário criado com sucesso!
        '400':
          $ref: '#/components/responses/CreateUserError'

        '401':
          $ref: '#/components/responses/UnauthorizedError'

        '403':
          $ref: '#/components/responses/ForbiddenError'
        
        '500':
          description: Role padrão ALUNO não encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Role padrão ALUNO não encontrada

  /auth/login:
    post:
      tags:
        - Autenticação
      summary: Realizar login
      description: Autentica um usuário utilizando matrícula e senha.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - matricula
                - senha
              properties:
                matricula:
                  type: string
                  example: 303030
                senha:
                  type: string
                  example: senha123
      responses:
        '200':
          description: Login realizado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
                  usuario:
                    type: object
                    properties:
                      id:
                        type: string
                      nome:
                        type: string
                      matricula:
                        type: string
                      role:
                        type: string
              example:
                message: Login realizado com sucesso!
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJjMmI1OGE0ZS1jNGNmLTRlMjAtOTc4Yy1jMWYyNzkzZWUxOGMiLCJyb2xlIjoiQURNSU4iLCJpYXQiOjE3ODI2OTYyNzUsImV4cCI6MTc4Mjc4MjY3NX0.GlTIaBuM4hpLlgBSoPduxG2A_SvEE7Xnzf4szdjw_ZE
                usuario:
                  properties:
                    id: c2b58a4e-c4cf-4e20-978c-c1f2793ee18c
                    nome: Francisco
                    matricula: '101010'
                    role: ALUNO
        '401':
          description: Credenciais inválidas.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Matrícula ou senha inválidas

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PostBase:
      type: object
      properties:
        postId:
          type: string
          example: 86c0ca58-c3f6-4fe7-8e0b-12df89530ac7
        titulo:
          type: string
          example: Aula 1 - TypeScript
        descricao:
          type: string
          example: Introdução ao TypeScript
        conteudo:
          type: string
          example: Conteúdo da aula...
        dataCriacao:
          type: string
          format: '2026-07-06T10:00:00.000Z'
        dataModificacao:
          type: string
          format: '2026-07-06T10:00:00.000Z'
        criadoPor:
          type: object
          properties:
            nome:
              type: string
              example: Ana Carolina
            tipoUsuario:
              type: string
              example: PROFESSOR

    PostAluno:
      allOf:
        - $ref: '#/components/schemas/PostBase'
        - type: object
          properties:
            foiVisto:
              type: boolean
              example: false

    PostProfessor:
      allOf:
        - $ref: '#/components/schemas/PostBase'
        - type: object
          description: Retornado para usuários PROFESSOR ou ADMIN.
          properties:
            visualizacoes:
              type: object
              properties:
                nome:
                  type: string
                  example: Maria
                tipoUsuario:
                  type: string
                  example: ALUNO
                viewedAt:
                  type: string
                  format: date-time
                  example: '2026-07-06T12:00:00.000Z'

    Usuario:
      type: object
      properties:
        userId:
          type: string
        roleId:
          type: string
        matricula:
          type: string
        nome:
          type: string

    ErrorResponse:
      type: object
      properties:
        message:
          type: string

  examples:
    ListaPostsAluno:
      summary: Resposta para aluno
      value:
        - postId: 78e6d80d-b03a-48a6-881d-a695979e8a69
          titulo: Aula 1 - TypeScript
          descricao: Introdução ao TypeScript
          conteudo: Conteúdo da aula
          dataCriacao: '2026-07-06T10:00:00.000Z'
          dataModificacao: '2026-07-06T10:00:00.000Z'
          criadoPor:
            nome: Ana Carolina
            tipoUsuario: PROFESSOR
          foiVisto: true

    ListaPostsProfessor:
      summary: Resposta para professor e admin
      value:
        - postId: 90b6d80d-b03a-48a6-881d-a695979e8a70
          titulo: Aula 2 - Node.js
          descricao: Introdução ao Node.js
          conteudo: Conteúdo da aula
          dataCriacao: '2026-07-06T11:00:00.000Z'
          dataModificacao: '2026-07-06T11:00:00.000Z'
          criadoPor:
            nome: Ana Carolina
            tipoUsuario: PROFESSOR
          visualizacoes:
            - nome: Maria
              tipoUsuario: ALUNO
              viewedAt: '2026-07-06T12:00:00.000Z'

  responses:
    UnauthorizedError:
      description: Falha na autenticação.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            noToken:
              summary: Token não informado
              value:
                message: Token não informado

            InvalidToken:
              summary: Token inválido ou expirado.
              value:
                message: Token inválido ou expirado.

    ForbiddenError:
      description: O usuário autenticado não possui permissão para acessar este recurso.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Acesso não autorizado.

    CreateUserError:
      description: Dados inválidos na requisição
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            EnrollmentAlreadyExists:
              summary: Matrícula já cadastrada
              value:
                message: Matrícula já cadastrada
            RoleNotFound:
              summary: Role não encontrada
              value:
                message: Role não encontrada
            

